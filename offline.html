<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffffff">
  <title>Doctor WOYZ Offline</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      color: #101828;
      background: #f8fafc;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
    }
    main {
      width: min(100%, 420px);
      padding: 28px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #fff;
    }
    .mark {
      width: 58px;
      height: 58px;
      margin: 0 auto 18px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: #fff;
      background: #1d4ed8;
      font-size: 34px;
      font-weight: 900;
    }
    h1 { margin: 0 0 8px; font-size: 24px; }
    p { margin: 0; color: #667085; line-height: 1.55; }
    button {
      margin-top: 20px;
      min-height: 44px;
      border: 0;
      border-radius: 7px;
      padding: 10px 18px;
      color: #fff;
      background: #175cd3;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark">W</div>
    <h1>You are offline</h1>
    <p>Reconnect to the internet to use Firebase approval and Gemini transcription.</p>
    <button type="button" onclick="location.reload()">Try again</button>
  </main>
</body>
</html>
